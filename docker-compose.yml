services:
  api:
    build:
      context: .
      target: api
    container_name: sportbook-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-file:/data/sportbook.db}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-7}
      WEB_ORIGIN: ${WEB_ORIGIN:-https://sportbook.example.com}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      PAYMOB_API_KEY: ${PAYMOB_API_KEY:-}
      PAYMOB_INTEGRATION_ID: ${PAYMOB_INTEGRATION_ID:-}
      PAYMOB_HMAC_SECRET: ${PAYMOB_HMAC_SECRET:-}
    volumes:
      - sportbook-data:/data
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - sportbook

  web:
    build:
      context: .
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://sportbook.example.com}
    container_name: sportbook-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - sportbook

volumes:
  sportbook-data:

networks:
  sportbook:
    driver: bridge
